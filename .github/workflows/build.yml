name: Build Firmware

on:
  push:
    branches: [ "main" ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./firmware

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch component repos
        working-directory: ./firmware
        run: |
          pip install requests
          python fetch_repos.py

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32s3
          path: './firmware'

      - name: Rename and upload firmware
        run: |
          mkdir -p release
          cp build/stack-chan.bin release/firmware.bin
          # Also create merged binary if needed
          ls -la build/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackchan-firmware
          path: firmware/build/
